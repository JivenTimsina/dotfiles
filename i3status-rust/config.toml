[theme]
theme = "plain"
[theme.overrides]
separator = "|"
idle_bg = "#00000000"
idle_fg = "#E1F2FE"
good_bg = "#00000000"
warning_bg = "#00000000"
critical_bg = "#00000000"
info_bg = "#00000000"
separator_bg = "#00000000"
separator_fg = "#666370"

[icons]
icons = "material-nf"

[[block]]
block = "music"
format = " $icon {$combo.str(max_w:20) $prev $play $next |}"

[[block]]
block = "net"
format = " $icon $ssid "

[[block]]
block = "memory"
format = " $icon$mem_used "
format_alt = " $icon_swap $swap_used_percents.eng(w:2) "

[[block]]
block = "battery"
format = " $icon $percentage "
full_format = " $icon $percentage "
empty_format = " $icon $percentage "
charging_format = " $icon $percentage "
warning = 20
critical = 10

[[block]]
block = "sound"
[[block.click]]
button = "left"
cmd = "wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle"

[[block]]
block = "backlight"
device = "intel_backlight"
format = " $icon $brightness "
[[block.click]]
button = "left"
cmd = "pgrep gammastep && pkill gammastep || gammastep -O 4000"

[[block]]
block = "time"
interval = 5
format = " $icon $timestamp.datetime(f:'%a %d/%m %I:%M %p') "

